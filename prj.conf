# Console / debug output
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y

# I2S driver
CONFIG_I2S=y

# GPIO (used if you drive MAX98357A's SD pin from a GPIO instead of tying it high)
CONFIG_GPIO=y

# Floating point support -- required for sinf()/fmodf() in the tone generator
CONFIG_FPU=y
CONFIG_FPU_SHARING=y
CONFIG_NEWLIB_LIBC=y
CONFIG_NEWLIB_LIBC_FLOAT_PRINTF=y

# Stack sizing -- default main stack can be tight with float math + I2S buffers
CONFIG_MAIN_STACK_SIZE=4096

# Memory slab / heap headroom (not strictly required for k_mem_slab, but safe default)
CONFIG_HEAP_MEM_POOL_SIZE=4096

CONFIG_SPEED_OPTIMIZATIONS=y
CONFIG_COMPILER_OPT="-O3"